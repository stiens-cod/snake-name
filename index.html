<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇小游戏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <h1>贪吃蛇小游戏</h1>
    <section class="game-panel">
      <div class="game-board">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="info">
          <div>得分：<span id="score">0</span></div>
          <div>最高：<span id="highScore">0</span></div>
          <div>速度：<span id="speedValue">5</span></div>
        </div>
        <div class="controls">
          <p>使用 <strong>WASD</strong> 控制方向，按 <strong>P</strong> 暂停 / 继续，按 <strong>空格</strong> 或点击按钮重新开始。</p>
          <button id="restartBtn">重新开始</button>
        </div>
        <div class="status-card">
          <span>状态：</span> <strong id="gameStatus">游戏准备中</strong>
        </div>
      </div>
    </section>
    <footer>
      <p>游戏目标：吃到食物，避免撞墙和自己。</p>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
